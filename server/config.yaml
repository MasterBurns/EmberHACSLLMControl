# Konfiguration für den lokalen LLM-Manager-Server
name: local_llm
command:
  - /home/masterburns/llm-workspace/llama.cpp/build/bin/llama-server
  - -m
  - /home/masterburns/llm-workspace/qwn3.6/Qwen3.6-27B-MTP-pi-tune-Q4_K_M.gguf
  - -fa
  - on
  - -c
  - "192000"
